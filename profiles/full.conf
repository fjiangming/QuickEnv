# =============================================================================
# QuickEnv Profile: 全量部署（必须部署的服务）
# 包含所有已确认在用的服务，按依赖顺序排列
# =============================================================================

# 服务列表（按执行顺序）
# - nginx 和 3x-ui 先部署（systemd 服务，无 Docker 依赖）
# - 然后是 Docker 服务
# - 最后是 syncthing 和 backup
SERVICES=(
    nginx
    3x-ui
    sub2api
    cli-proxy-api
    syncthing
    backup
)
